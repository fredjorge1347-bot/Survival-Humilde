name: Build SurvivalHumilde

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extrair ZIP
        run: unzip SurvivalHumilde-src-v4-fixed(1).zip

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('v4/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build com Maven
        run: mvn package -f v4/pom.xml -q

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: SurvivalHumilde
          path: v4/target/SurvivalHumilde.jar
