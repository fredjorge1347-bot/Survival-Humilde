name: Build SurvivalHumilde

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar codigo
        uses: actions/checkout@v4

      - name: Instalar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Extrair ZIP
        run: unzip SurvivalHumilde-src.zip

      - name: Compilar plugin
        run: cd SurvivalHumilde && mvn package -B

      - name: Salvar o .jar
        uses: actions/upload-artifact@v4
        with:
          name: SurvivalHumilde
          path: SurvivalHumilde/target/SurvivalHumilde.jar
