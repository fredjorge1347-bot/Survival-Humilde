name: Build SurvivalHumilde

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Baixar codigo fonte
        run: |
          curl -L "https://cdn.claude.ai/api/organizations/files/SurvivalHumilde-src.zip" -o src.zip || true
          wget -O projeto.zip "https://github.com/fredjorge1347-bot/Survival-Humilde/releases/download/v1/SurvivalHumilde-src.zip" || true

      - name: Montar estrutura do projeto
        run: |
          mkdir -p src/main/java/com/survivalhumilde/{commands,economy,games,listeners,managers}
          mkdir -p src/main/resources
