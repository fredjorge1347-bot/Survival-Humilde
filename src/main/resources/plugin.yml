name: SurvivalHumilde
version: 1.0.0
main: com.survivalhumilde.Main
api-version: '1.21'
author: SurvivalHumilde
description: Plugin All-in-One para Survival Humilde

depend: [Vault]

commands:
  money:
    description: Ver saldo
    usage: /money [jogador]
  pay:
    description: Transferir moedas
    usage: /pay <jogador> <quantia>
  spawn:
    description: Ir ao spawn
    usage: /spawn
  sethome:
    description: Definir home
    usage: /sethome [nome]
  home:
    description: Ir para home
    usage: /home [nome]
  delhome:
    description: Deletar home
    usage: /delhome <nome>
  tpa:
    description: Pedir teleporte
    usage: /tpa <jogador>
  tpaccept:
    description: Aceitar teleporte
    usage: /tpaccept
  tpdeny:
    description: Recusar teleporte
    usage: /tpdeny
  rtp:
    description: Teleporte aleatório
    usage: /rtp
  servico:
    description: Anunciar serviço
    usage: /servico <mensagem>
  setspawn:
    description: Definir spawn
    usage: /setspawn
